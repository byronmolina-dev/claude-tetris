<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <label class="theme-toggle" for="theme-toggle" title="Cambiar tema claro/oscuro">
      <input type="checkbox" id="theme-toggle" />
      <span class="theme-toggle-track">
        <span class="theme-toggle-thumb"></span>
      </span>
    </label>
    <button id="records-btn" class="records-btn" type="button" title="Ver récords">Récords</button>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
          <span class="piece-name" id="next-name"></span>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <form id="overlay-name-form" class="name-form hidden">
          <label class="label" for="overlay-name-input">¡Nuevo récord! Nombre</label>
          <input id="overlay-name-input" type="text" maxlength="12" autocomplete="off" placeholder="Nombre" />
          <button type="submit" id="overlay-save-btn">Guardar</button>
        </form>

        <div id="overlay-highscores-section" class="records-section hidden">
          <p class="overlay-heading">RÉCORDS</p>
          <ol id="overlay-highscores-list" class="highscore-list"></ol>
          <p id="overlay-stats" class="stats-line"></p>
          <button id="overlay-reset-btn" class="reset-btn" type="button">Resetear récords</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="start-screen" class="overlay hidden">
      <div class="overlay-box">
        <p class="overlay-heading">RÉCORDS</p>
        <ol id="start-highscores-list" class="highscore-list"></ol>
        <p id="start-stats" class="stats-line"></p>
        <button id="start-play-btn" type="button">Jugar</button>
        <button id="start-reset-btn" class="reset-btn" type="button">Resetear récords</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
